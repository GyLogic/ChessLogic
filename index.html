<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCGG Builder - Tap Fix v23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; touch-action: manipulation; }
        
        /* Slot Papan */
        .board-slot { 
            width: 100%; aspect-ratio: 1 / 1; 
            display: flex; align-items: center; justify-content: center; 
            border: 2px dashed #334155; border-radius: 10px; 
            background-color: rgba(30, 41, 59, 0.4); 
            position: relative; cursor: pointer;
        }
        .bench-slot { background-color: rgba(15, 23, 42, 0.8); border: 2px solid #1e293b; }
        
        /* Hero Terpilih (Pulse Animation) */
        .selected-hero { 
            outline: 4px solid #10b981 !important; 
            box-shadow: 0 0 25px #10b981; 
            animation: pulse-select 1.5s infinite;
            z-index: 50;
        }
        @keyframes pulse-select {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hero Image */
        .hero-container { width: 90%; height: 90%; position: relative; pointer-events: none; } /* Supaya klik tembus ke slot */
        .hero-icon { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        
        /* Pool Hero (Kiri) */
        .pool-item { 
            width: 60px; height: 60px; /* Ukuran Mobile Besar */
            object-fit: cover; border-radius: 10px; 
            border: 2px solid transparent; cursor: pointer;
            background-color: #1e293b;
        }
        @media (min-width: 768px) { .pool-item { width: 50px; height: 50px; } }

        /* Rekomendasi */
        .hero-rec-high { border: 3px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .hero-rec-mid { border: 2px solid #3b82f6 !important; }
        
        .category-section.priority-high { order: -2; background-color: rgba(16, 185, 129, 0.05); }
        .category-section.priority-mid { order: -1; }
        .category-section.dimmed { opacity: 0.2; filter: grayscale(1); order: 100; }
        
        /* Tombol Level Up */
        .btn-lvlup { 
            position: absolute; top: -10px; right: -10px; 
            background: #10b981; color: white; width: 28px; height: 28px; 
            border-radius: 50%; font-size: 16px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 100; border: 2px solid white; pointer-events: auto;
        }
        
        #custom-tooltip { position: fixed; pointer-events: none; z-index: 1000; display: none; background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; font-size: 11px; }
        .star-level { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); display: flex; gap: 1px; }
        .star { color: #fbbf24; text-shadow: 0 0 4px #000; font-size: 10px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 p-2 md:p-4 font-sans select-none">

    <div id="custom-tooltip"></div>

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-4 flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-xl">
            <h1 class="text-xl font-black text-blue-400 uppercase">MCGG <span class="text-amber-400">TAP FIX</span></h1>
            <div class="flex items-center gap-2">
                <select id="cmd-lvl" onchange="renderPool()" class="bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-white outline-none">
                    <option value="3">Lv.3</option><option value="4">Lv.4</option><option value="5" selected>Lv.5</option>
                    <option value="6">Lv.6</option><option value="7">Lv.7</option><option value="8">Lv.8</option>
                    <option value="9">Lv.9</option><option value="10">Lv.10</option>
                </select>
                <button onclick="clearAll()" class="bg-rose-600 text-white px-3 py-1.5 rounded-lg font-black text-[10px]">RESET</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            <div class="lg:col-span-3 bg-slate-900 rounded-xl border border-slate-800 flex flex-col h-[500px] lg:h-[850px]">
                <div class="p-3 border-b border-slate-800">
                    <input type="text" id="searchHero" placeholder="Cari Hero..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-3 text-sm mb-3">
                    <div class="flex p-1 bg-slate-950 rounded-lg border border-slate-800">
                        <button onclick="switchView('faction')" id="tab-faction" class="flex-1 py-2 text-[10px] rounded-md bg-blue-600 text-white">FACTION</button>
                        <button onclick="switchView('role')" id="tab-role" class="flex-1 py-2 text-[10px] rounded-md text-slate-400 ml-1">ROLE</button>
                    </div>
                </div>
                <div id="hero-pool" class="flex-1 overflow-y-auto p-3 flex flex-col space-y-4"></div>
            </div>

            <div class="lg:col-span-6 flex flex-col gap-4">
                <div class="bg-slate-900 p-4 md:p-8 rounded-2xl border border-slate-800 relative">
                    <div id="board" class="grid grid-cols-7 gap-2 md:gap-3"></div>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 border-t-4 border-t-slate-700">
                    <div id="bench" class="grid grid-cols-8 gap-2 md:gap-3"></div>
                </div>
            </div>

            <div class="lg:col-span-3 bg-slate-900 p-4 rounded-xl border border-slate-800 h-auto lg:h-[850px] overflow-y-auto">
                <h2 class="text-sm font-black mb-4 uppercase border-b border-slate-800 pb-2 text-blue-400">Sinergi Aktif</h2>
                <div id="synergy-output" class="space-y-2 pb-10"></div>
            </div>
        </div>
    </div>

    <script>

            { id: 45, name: "Minotaur", faction: ["Glory League"], role: ["Defender"], gold: 3, icon: "icons/minotaur.png" },
            { id: 46, name: "Roger", faction: ["Glory League"], role: ["Weapon Master"], gold: 4, icon: "icons/roger.png" },
            { id: 47, name: "Beatrix", faction: ["Glory League"], role: ["Marksman"], gold: 2, icon: "icons/beatrix.png" },
            { id: 48, name: "Silvanna", faction: ["Mystic Meow"], role: ["Dauntless"], gold: 1, icon: "icons/silvanna.png" },
            { id: 49, name: "Lesley", faction: ["Mystic Meow"], role: ["Marksman"], gold: 5, icon: "icons/lesley.png" },
            { id: 50, name: "Julian", faction: ["Mystic Meow"], role: ["Mage", "Phasewarper"], gold: 3, icon: "icons/julian.png" },
            { id: 51, name: "Edith", faction: ["Beyond the Clouds"], role: ["Defender"], gold: 5, icon: "icons/edith.png" },
            { id: 52, name: "Xavier", faction: ["Beyond the Clouds"], role: ["Stargazer"], gold: 3, icon: "icons/xavier.png" },
            { id: 53, name: "Natalia", faction: ["Beyond the Clouds"], role: ["Swift blade"], gold: 2, icon: "icons/natalia.png" }
        ];

        let boardState = Array(21).fill(null), benchState = Array(8).fill(null);
        let currentView = 'faction', currentBoardCounts = {};
        let selectedSource = null; 

        function switchView(view) { currentView = view; renderPool(); }

        function initGrid(id, size, className) {
            const el = document.getElementById(id);
            for (let i = 0; i < size; i++) {
                const slot = document.createElement('div');
                slot.className = className; slot.dataset.index = i; slot.dataset.type = id;
                slot.onclick = () => handleSlotClick(id, i);
                el.appendChild(slot);
            }
        }
        initGrid('board', 21, 'board-slot');
        initGrid('bench', 8, 'board-slot bench-slot');

        function handleSlotClick(type, index) {
            const arr = (type === 'board' ? boardState : benchState);
            const currentHero = arr[index];

            if (selectedSource) {
                // Letakkan hero ke slot
                if (selectedSource.type === 'pool') {
                    arr[index] = { ...selectedSource.hero, star: 1 };
                } else {
                    const srcArr = (selectedSource.type === 'board' ? boardState : benchState);
                    const temp = arr[index];
                    arr[index] = srcArr[selectedSource.index];
                    srcArr[selectedSource.index] = temp;
                }
                selectedSource = null;
            } else if (currentHero) {
                // Pilih hero dari papan/bench untuk dipindah atau dihapus (double click manual = reset hero)
                selectedSource = { type, index };
            }
            updateUI();
        }

        function renderPool() {
            const poolEl = document.getElementById('hero-pool'); poolEl.innerHTML = "";
            const searchVal = document.getElementById('searchHero').value.toLowerCase();
            const cmdLvl = document.getElementById('cmd-lvl').value;
            const categories = [...new Set(heroes.flatMap(h => currentView === 'faction' ? h.faction : h.role))].sort();

            categories.forEach(cat => {
                const heroesInCat = heroes.filter(h => (currentView === 'faction' ? h.faction.includes(cat) : h.role.includes(cat)) && h.name.toLowerCase().includes(searchVal));
                if (heroesInCat.length === 0) return;

                const processed = heroesInCat.map(hero => {
                    let gNames = []; [...hero.faction, ...hero.role].forEach(s => { if (currentBoardCounts[s]) gNames.push(s); });
                    let prob = shopProb[cmdLvl][hero.gold - 1] || 0;
                    return { ...hero, gNames, prob, score: (gNames.length * 1000) + prob };
                }).sort((a, b) => b.score - a.score);

                const section = document.createElement('div');
                const maxGain = processed[0].gNames.length;
                let pClass = (currentBoardCounts.hasOwnProperty(cat) || Object.keys(currentBoardCounts).length === 0) ? (maxGain >= 1 ? 'priority-high' : 'priority-mid') : 'dimmed';
                
                section.className = `category-section p-2 rounded-lg border-l-4 mb-2 ${pClass}`;
                section.style.borderColor = synergyConfig[cat]?.hex || "#334155";
                section.innerHTML = `<h3 class="text-[9px] font-black uppercase mb-2" style="color: ${synergyConfig[cat]?.hex}">${cat}</h3>`;
                
                const grid = document.createElement('div'); grid.className = "grid grid-cols-5 md:grid-cols-4 gap-2";
                processed.forEach(hero => {
                    const img = document.createElement('img');
                    img.src = fixPath(hero.icon);
                    const isOnBoard = boardState.some(h => h && h.id === hero.id);
                    let rec = "";
                    if (!isOnBoard && Object.keys(currentBoardCounts).length > 0) {
                        if (hero.gNames.length >= 2) rec = "hero-rec-high";
                        else if (hero.gNames.length === 1) rec = "hero-rec-mid";
                    }

                    const isSel = (selectedSource?.type === 'pool' && selectedSource.hero.id === hero.id);
                    img.className = `pool-item ${rec} ${isSel ? 'selected-hero' : ''}`;
                    img.onclick = (e) => { e.stopPropagation(); selectedSource = { type: 'pool', hero }; updateUI(); };
                    
                    // Tooltip
                    img.onmouseenter = (e) => {
                        const tooltip = document.getElementById('custom-tooltip');
                        tooltip.style.display = 'block';
                        let gStr = hero.gNames.map(gn => `<span style="color:${synergyConfig[gn]?.hex || '#fff'}">${gn}</span>`).join(", ");
                        tooltip.innerHTML = `<b>${hero.name}</b> (${hero.gold}G)<br>Muncul: ${hero.prob}%<br>Benefit: ${hero.gNames.length > 0 ? gStr : '-'}`;
                    };
                    img.onmousemove = (e) => { 
                        const tooltip = document.getElementById('custom-tooltip');
                        tooltip.style.left = e.clientX + 10 + 'px'; 
                        tooltip.style.top = e.clientY + 10 + 'px'; 
                    };
                    img.onmouseleave = () => document.getElementById('custom-tooltip').style.display = 'none';

                    grid.appendChild(img);
                });
                section.appendChild(grid); poolEl.appendChild(section);
            });
        }

        function updateUI() {
            currentBoardCounts = {}; const uniqueIds = new Set();
            boardState.forEach(h => { if (h && !uniqueIds.has(h.id)) { uniqueIds.add(h.id); [...h.faction, ...h.role].forEach(t => currentBoardCounts[t] = (currentBoardCounts[t] || 0) + 1); } });

            const renderGrid = (type, state, selector) => {
                const slots = document.querySelectorAll(selector);
                state.forEach((hero, i) => {
                    slots[i].innerHTML = ""; 
                    slots[i].className = `board-slot ${type === 'bench' ? 'bench-slot' : ''}`;
                    if (selectedSource && selectedSource.type === type && selectedSource.index === i) slots[i].classList.add('selected-hero');

                    if (hero) {
                        const container = document.createElement('div'); container.className = "hero-container";
                        const img = document.createElement('img'); img.src = fixPath(hero.icon); img.className = "hero-icon";
                        
                        const starDiv = document.createElement('div'); starDiv.className = "star-level";
                        for(let s=0; s<hero.star; s++) starDiv.innerHTML += '<span class="star">★</span>';
                        
                        if (hero.star < 3) {
                            const btn = document.createElement('div'); btn.className = "btn-lvlup"; btn.innerText = "+";
                            btn.onclick = (e) => { e.stopPropagation(); if (hero.star < 3) hero.star++; updateUI(); }; 
                            slots[i].appendChild(btn);
                        }

                        if (type === 'bench') {
                            let gn = []; [...hero.faction, ...hero.role].forEach(s => { if (currentBoardCounts[s]) gn.push(s); });
                            if (gn.length >= 2) container.classList.add('hero-rec-high'); else if (gn.length === 1) container.classList.add('hero-rec-mid');
                        }

                        container.appendChild(img); container.appendChild(starDiv);
                        slots[i].appendChild(container);
                        if (hero.star === 3) slots[i].classList.add('max-level-glow');
                        if (type === 'board') {
                            let bc = "#3b82f6", hg = 0;
                            [...hero.faction, ...hero.role].forEach(t => { if (currentBoardCounts[t] >= 2 && currentBoardCounts[t] > hg) { hg = currentBoardCounts[t]; bc = synergyConfig[t]?.hex || "#fff"; } });
                            if (hg > 0) { slots[i].style.borderColor = bc; slots[i].style.borderWidth = "4px"; slots[i].style.borderStyle = "solid"; }
                        }
                    }
                });
            };
            renderGrid('board', boardState, '#board .board-slot');
            renderGrid('bench', benchState, '#bench .board-slot');

            const output = document.getElementById('synergy-output'); output.innerHTML = "";
            Object.entries(currentBoardCounts).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
                const config = synergyConfig[name] || { hex: "#4b5563", icon: "icons/default.png" };
                const div = document.createElement('div'); 
                div.className = `p-2 rounded-lg mb-1 flex items-center gap-2 ${count<2?'opacity-40':'shadow-lg'}`;
                div.style.backgroundColor = config.hex;
                div.style.color = (parseInt(config.hex.replace('#',''), 16) > 0xffffff/2) ? 'black' : 'white';
                div.innerHTML = `<img src="${fixPath(config.icon)}" class="contributor-icon w-4 h-4"><div class="flex-1 font-black text-[9px] uppercase">${name}</div><span class="font-black text-[10px]">${count}</span>`;
                output.appendChild(div);
            });
            renderPool();
        }
        
        function clearAll() { 
            boardState.fill(null); benchState.fill(null); 
            selectedSource = null; updateUI(); 
        }
        document.getElementById('searchHero').addEventListener('input', () => renderPool());
        renderPool();
